<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Misión Batman: Cumpleaños de David Damian!</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@700&family=Montserrat:wght@700&display=swap" rel="stylesheet">

    <style>
        /* Estilos generales y del FONDO DE LA PÁGINA COMPLETE */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita el scroll durante el video */
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
            
            /* --- MODIFICACIÓN: Imagen de fondo cubriendo TODA la página --- */
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('fondo.jpg');
            background-size: cover; /* Cubre todo el ancho y alto */
            background-position: center; /* Centra la imagen */
            background-attachment: fixed; /* Mantiene el fondo fijo al hacer scroll */
            min-height: 100vh; /* Asegura que el body ocupe toda la altura visible */
            display: flex; /* Usamos flexbox para centrar la tarjeta */
            justify-content: center; /* Centra horizontalmente */
            align-items: center; /* Centra verticalmente */
        }

        /* --- CONTENEDOR DEL VIDEO --- */
        #video-intro-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #video-intro {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- CONTENEDOR DE LA INVITACIÓN --- */
        #invitation-content {
            display: none; /* Oculto hasta que termine el video */
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- TARJETA DE TEXTO CENTRADA Y MÁS PEQUEÑA --- */
        .card {
            border: 4px solid #FFD700;
            padding: 25px;
            border-radius: 20px;
            
            /* --- MODIFICACIÓN: Tamaño de la tarjeta reducido --- */
            max-width: 350px; /* Un poco más estrecha */
            width: 85%; /* Ancho responsivo */
            
            background-color: rgba(0, 0, 0, 0.85); /* Fondo negro semi-transparente para legibilidad */
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6); /* Brillo amarillo */
            text-align: center;
            position: relative;
            z-index: 10; /* Asegura que esté sobre el fondo */
        }

        /* --- EFECTO PARPADEO BATISEÑAL (H1) --- */
        @keyframes bat-flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 0 0 7px #fff, 0 0 10px #fff, 0 0 21px #fff, 0 0 42px #FFD700, 0 0 82px #FFD700;
                opacity: 1;
            }
            20%, 24%, 55% {
                text-shadow: none;
                opacity: 0.7;
            }
        }

        h1 {
            font-family: 'Bangers', cursive;
            font-size: 3.2em;
            color: #FFD700;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            animation: bat-flicker 2.5s infinite;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6em;
            color: #fff;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        p {
            color: #eee;
            font-size: 1em;
            margin: 8px 0;
        }

        strong {
            color: #FFD700;
        }

        /* --- BOTÓN ANIMADO TIPO BATISEÑAL --- */
        .btn {
            display: block;
            background-color: #FFD700;
            color: #000;
            padding: 12px;
            margin: 18px auto;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            max-width: 220px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            font-size: 0.9em;
        }

        .btn:hover {
            background-color: #fff;
            transform: scale(1.05);
            /* Efecto de resplandor al pasar el mouse */
            box-shadow: 0 0 20px #FFD700, 0 0 40px #FFD700;
            letter-spacing: 1px;
        }

        .audio-container {
            margin-top: 20px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px;
            border-radius: 10px;
        }

        /* Responsividad para móviles muy pequeños */
        @media (max-width: 360px) {
            h1 { font-size: 2.4em; }
            h2 { font-size: 1.2em; }
            .card { padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="video-intro-container">
        <video id="video-intro" autoplay muted playsinline>
            <source src="video_output.mp4" type="video/mp4">
            Tu navegador no soporta video.
        </video>
    </div>

    <div id="invitation-content">
        <div class="card">
            <h1>¡BATI-FIESTA!</h1>
            <p>La Batiseñal se ha encendido para el cumpleaños de:</p>
            <h2>David Damian Muñoz Valdez</h2>
            
            <p><strong>FECHA:</strong> Sábado, 20 de Octubre</p>
            <p><strong>HORA:</strong> 4:00 PM</p>
            <p><strong>LUGAR:</strong> Salón "La Baticueva"</p>

            <a href="https://maps.app.goo.gl/TU_LINK" target="_blank" class="btn">📍 Ver Ubicación</a>

            <a href="https://wa.me/TU_NUMERO" class="btn">📱 Confirmar Asistencia</a>

            <div class="audio-container">
                <p style="font-size: 0.8em; color: #FFD700;">ACTIVAR BATI-MÚSICA</p>
                <audio controls loop style="width: 100%; height: 30px;">
                    <source src="musica.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-intro');
        const videoContainer = document.getElementById('video-intro-container');
        const content = document.getElementById('invitation-content');

        // Función para cambiar de video a invitación
        function mostrarInvitacion() {
            videoContainer.style.display = 'none';
            content.style.display = 'flex';
            document.body.style.overflow = 'auto';
        }

        // Evento: Cuando el video termina
        video.addEventListener('ended', mostrarInvitacion);

        // Backup: Si el video falla o no carga en 8 segundos, mostrar la invitación
        setTimeout(() => {
            if (content.style.display !== 'flex') {
                mostrarInvitacion();
            }
        }, 8000);
    </script>
</body>
</html>
