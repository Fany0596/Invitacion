<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Misión Batman: Cumpleaños de David Damian!</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@700&family=Montserrat:wght@700&display=swap" rel="stylesheet">

    <style>
        /* Estilos generales */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita el scroll durante el video */
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
        }

        /* --- CONTENEDOR DEL VIDEO --- */
        #video-intro-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #video-intro {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- CONTENEDOR DE LA INVITACIÓN --- */
        #invitation-content {
            display: none; /* Oculto hasta que termine el video */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b0d17; /* Color de respaldo oscuro */
        }

        /* --- TARJETA CON FONDO PERSONALIZADO --- */
        .card {
            border: 4px solid #FFD700;
            padding: 30px 20px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            margin: 20px;
            text-align: center;
            /* Aplicamos tu imagen de fondo con un filtro oscuro para leer bien el texto */
            background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('fondo.jpg');
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            position: relative;
        }

        /* --- EFECTO PARPADEO BATISEÑAL (H1) --- */
        @keyframes bat-flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 0 0 7px #fff, 0 0 10px #fff, 0 0 21px #fff, 0 0 42px #FFD700, 0 0 82px #FFD700;
                opacity: 1;
            }
            20%, 24%, 55% {
                text-shadow: none;
                opacity: 0.7;
            }
        }

        h1 {
            font-family: 'Bangers', cursive;
            font-size: 3.8em;
            color: #FFD700;
            margin: 0 0 10px 0;
            letter-spacing: 3px;
            animation: bat-flicker 2.5s infinite;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8em;
            color: #fff;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        p {
            color: #eee;
            font-size: 1.1em;
            margin: 10px 0;
        }

        strong {
            color: #FFD700;
        }

        /* --- BOTÓN ANIMADO TIPO BATISEÑAL --- */
        .btn {
            display: block;
            background-color: #FFD700;
            color: #000;
            padding: 15px;
            margin: 20px auto;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            max-width: 250px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .btn:hover {
            background-color: #fff;
            transform: scale(1.05);
            /* Efecto de resplandor al pasar el mouse */
            box-shadow: 0 0 20px #FFD700, 0 0 40px #FFD700;
            letter-spacing: 1px;
        }

        .audio-container {
            margin-top: 25px;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px;
            border-radius: 10px;
        }

        /* Responsividad para móviles */
        @media (max-width: 480px) {
            h1 { font-size: 2.8em; }
            h2 { font-size: 1.4em; }
            .card { padding: 20px 15px; }
        }
    </style>
</head>
<body>

    <div id="video-intro-container">
        <video id="video-intro" autoplay muted playsinline>
            <source src="video_output.mp4" type="video/mp4">
            Tu navegador no soporta video.
        </video>
    </div>

    <div id="invitation-content">
        <div class="card">
            <h1>¡BATI-FIESTA!</h1>
            <p>La Batiseñal se ha encendido para el cumpleaños de:</p>
            <h2>David Damian Muñoz Valdez</h2>
            
            <p><strong>FECHA:</strong> Sábado, 20 de Octubre</p>
            <p><strong>HORA:</strong> 4:00 PM</p>
            <p><strong>LUGAR:</strong> Salón "La Baticueva"</p>

            <a href="https://maps.app.goo.gl/TU_LINK" target="_blank" class="btn">📍 Ver Ubicación</a>

            <a href="https://wa.me/TU_NUMERO" class="btn">📱 Confirmar Asistencia</a>

            <div class="audio-container">
                <p style="font-size: 0.8em; color: #FFD700;">ACTIVAR BATI-MÚSICA</p>
                <audio controls loop style="width: 100%; height: 30px;">
                    <source src="musica.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-intro');
        const videoContainer = document.getElementById('video-intro-container');
        const content = document.getElementById('invitation-content');

        // Función para cambiar de video a invitación
        function mostrarInvitacion() {
            videoContainer.style.display = 'none';
            content.style.display = 'flex';
            document.body.style.overflow = 'auto';
        }

        // Evento: Cuando el video termina
        video.addEventListener('ended', mostrarInvitacion);

        // Backup: Si el video falla o no carga en 8 segundos, mostrar la invitación
        setTimeout(() => {
            if (content.style.display !== 'flex') {
                mostrarInvitacion();
            }
        }, 8000);
    </script>
</body>
</html>
